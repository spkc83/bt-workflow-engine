procedure:
  id: cs_refund_fg
  name: "Customer Service - Refund Request (Fine-Grained)"
  description: "Handle customer refund requests with structured conditions, explicit tool mappings, and detection keywords"
  version: "2.0"
  domain: customer_service
  trigger_intents:
    - refund
    - return
    - money back
    - cancel order

  available_tools:
    - lookup_order
    - search_orders
    - issue_refund
    - issue_store_credit
    - update_case_status
    - escalate_to_supervisor

  data_context:
    - order_id
    - customer_id
    - order_data
    - refund_result

  steps:
    - id: greet_and_collect
      name: "Collect Order Information"
      action: collect_info
      instruction: >
        Check the customer's message for ANY order identification details — an explicit
        order number (e.g., "ORD-123"), or natural language clues such as a store/merchant
        name, item description, approximate amount, or time reference. If ANY details are
        present, acknowledge briefly and move to the lookup step immediately. Only if the
        message has NO identifiable purchase details, greet warmly and ask them to describe
        what they purchased.
      extract_fields:
        - key: order_id
          description: "Explicit order number like ORD-123 or ORD-789"
          examples: ["ORD-123", "ORD-789", "order 456"]
        - key: merchant_name
          description: "Store or merchant name from the customer's description"
          examples: ["TechMart", "SportZone", "HomeGoods"]
        - key: item_description
          description: "Description of the item purchased"
          examples: ["headphones", "running shoes", "laptop charger"]
        - key: amount
          description: "Approximate dollar amount of the order"
          examples: ["$80", "about 50 dollars", "150"]
      required_fields:
        - order_id
      next_step: lookup_order

    - id: lookup_order
      name: "Look Up Order"
      action: tool_call
      instruction: >
        Find the customer's order. If an exact order ID was provided, use lookup_order.
        Otherwise use search_orders with whatever details are available (merchant name,
        amount, date, customer_id). Confirm the order details with the customer.
      tools:
        - name: lookup_order
          arg_mappings:
            - param: order_id
              source: order_id
          result_key: order_data
          guard_condition:
            field: order_id
            operator: neq
            value: ""
        - name: search_orders
          arg_mappings:
            - param: customer_id
              source: customer_id
            - param: merchant_name
              source: merchant_name
            - param: amount
              source: amount
          result_key: order_data
      on_success: check_eligibility
      on_failure: order_not_found

    - id: check_eligibility
      name: "Check Refund Eligibility"
      action: evaluate
      instruction: >
        Evaluate whether the order qualifies for a refund based on time window,
        order status, and item category.
      conditions:
        - condition:
            field: order_date
            operator: within_days
            value: 30
          condition_description: "Order was placed within the last 30 days"
          next_step: check_status
        - condition:
            field: order_date
            operator: outside_days
            value: 30
          condition_description: "Order is outside the 30-day return window"
          next_step: deny_refund_window

    - id: check_status
      name: "Check Order Status"
      action: evaluate
      instruction: >
        Check the order status to determine the appropriate action path.
      conditions:
        - condition:
            field: order_status
            operator: in
            value: ["delivered", "shipped"]
          condition_description: "Order has been delivered or shipped — eligible for refund"
          next_step: process_refund
        - condition:
            field: order_status
            operator: eq
            value: "processing"
          condition_description: "Order is still processing — handle as cancellation"
          next_step: cancel_order

    - id: process_refund
      name: "Process Refund"
      action: tool_call
      instruction: >
        Inform the customer their refund is approved. Be warm and positive. Explain
        the refund will go back to their original payment method in 5-7 business days.
        Provide a reference number.
      tools:
        - name: issue_refund
          arg_mappings:
            - param: order_id
              source: order_id
            - param: amount
              source: amount
          result_key: refund_result
      on_success: close_case
      on_failure: escalate_case

    - id: deny_refund_window
      name: "Deny Refund — Outside Window"
      action: inform
      instruction: >
        Politely inform the customer their order is outside the 30-day return window.
        Offer store credit or escalation to a supervisor as alternatives.
      options:
        - label: "Store credit"
          description: "Customer accepts store credit for the order value"
          next_step: offer_store_credit
          detection_keywords:
            - credit
            - store
            - accept
            - "yes"
            - okay
            - sure
            - fine
        - label: "Escalation"
          description: "Customer requests to speak with a supervisor"
          next_step: escalate_case
          detection_keywords:
            - escalat
            - supervisor
            - manager
            - "no"
            - not acceptable
            - speak to someone

    - id: offer_store_credit
      name: "Issue Store Credit"
      action: tool_call
      instruction: >
        Process store credit for the customer. Inform them of the credit amount,
        how to use it, and the 12-month validity period.
      tools:
        - name: issue_store_credit
          arg_mappings:
            - param: order_id
              source: order_id
            - param: amount
              source: amount
          result_key: store_credit_result
      on_success: close_case
      on_failure: escalate_case

    - id: order_not_found
      name: "Order Not Found"
      action: inform
      instruction: >
        Apologize that the order could not be found. Suggest possible reasons
        (typo, different email, guest checkout) and ask to try again.
      options:
        - label: "Try again"
          description: "Customer wants to provide updated information"
          next_step: greet_and_collect
          detection_keywords:
            - try
            - again
            - check
            - different
            - another
        - label: "Escalate"
          description: "Customer wants help from a supervisor"
          next_step: escalate_case
          detection_keywords:
            - help
            - supervisor
            - escalat

    - id: cancel_order
      name: "Cancel Processing Order"
      action: tool_call
      instruction: >
        The order is still processing. Cancel it and inform the customer they
        will receive a full refund within 3-5 business days.
      tools:
        - name: update_case_status
          arg_mappings:
            - param: case_id
              source: case_id
          fixed_args:
            new_status: "cancelled"
          result_key: cancellation_result
      on_success: close_case
      on_failure: escalate_case

    - id: escalate_case
      name: "Escalate to Supervisor"
      action: tool_call
      instruction: >
        Escalate the case to a senior representative. Summarize the issue and
        what has been attempted. Provide the customer with a case reference number.
      tools:
        - name: escalate_to_supervisor
          arg_mappings:
            - param: case_id
              source: case_id
          result_key: escalation_result
      on_success: close_case
      on_failure: close_case

    - id: close_case
      name: "Close Case"
      action: tool_call
      instruction: >
        Summarize the actions taken, confirm the resolution, and ask if there is
        anything else the customer needs. Update the case status.
      tools:
        - name: update_case_status
          arg_mappings:
            - param: case_id
              source: case_id
          fixed_args:
            new_status: "resolved"
          result_key: close_result
      on_success: end
      on_failure: end
      next_step: end
