procedure:
  id: fraud_alert_triage
  name: "Fraud Operations - Alert Triage"
  description: "Triage and investigate fraud alerts, gather evidence, and take appropriate action"
  version: "2.0"
  domain: fraud_ops
  trigger_intents:
    - fraud alert
    - suspicious activity
    - fraud investigation
    - alert triage
    - suspicious transaction

  available_tools:
    - get_fraud_alert
    - get_account_transactions
    - check_device_fingerprint
    - flag_account
    - submit_sar
    - close_alert
    - escalate_to_supervisor
    - add_case_note

  data_context:
    - alert_id
    - account_id
    - alert_data
    - transaction_data
    - device_data

  steps:
    - id: collect_alert_id
      name: "Collect Alert ID"
      action: collect_info
      instruction: >
        Check the analyst's message for a fraud alert ID (e.g., "FA-001", "FA-123").
        If the alert ID is present, proceed to look it up. If not, ask the analyst
        to provide the alert ID they want to investigate.
      extract_fields:
        - key: alert_id
          description: "Fraud alert identifier like FA-001 or FA-123"
          examples: ["FA-001", "FA-123", "alert FA-042"]
      required_fields:
        - alert_id
      next_step: receive_alert

    - id: receive_alert
      name: "Retrieve Alert Details"
      action: tool_call
      instruction: >
        Retrieve the fraud alert details. The alert details will include: alert type,
        creation timestamp, the associated account or customer, the triggering event,
        and an initial risk score. If the alert cannot be found, ask to verify the ID.
      tools:
        - name: get_fraud_alert
          arg_mappings:
            - param: alert_id
              source: alert_id
          result_key: alert_data
      on_success: review_alert_details
      on_failure: alert_not_found

    - id: review_alert_details
      name: "Assess Alert Severity"
      action: evaluate
      instruction: >
        Review the alert details and determine the investigation path based on severity
        and risk score. High severity or high risk score requires full investigation.
        Medium severity gets standard investigation. Low severity gets a quick review.
      conditions:
        - condition:
            field: severity
            operator: eq
            value: "high"
          condition_description: "High severity alert — full investigation required"
          next_step: gather_transaction_evidence
        - condition:
            field: risk_score
            operator: gte
            value: 80
          condition_description: "High risk score (>= 80) — full investigation required"
          next_step: gather_transaction_evidence
        - condition:
            field: severity
            operator: eq
            value: "medium"
          condition_description: "Medium severity — standard investigation"
          next_step: gather_transaction_evidence
        - condition:
            field: severity
            operator: eq
            value: "low"
          condition_description: "Low severity — quick review"
          next_step: assess_risk

    - id: gather_transaction_evidence
      name: "Gather Transaction Evidence"
      action: tool_call
      instruction: >
        Pull the account's recent transaction history to identify patterns or anomalies that
        corroborate or contradict the fraud alert. Look for unusual transaction amounts,
        transactions in unusual geographic locations, high velocity of transactions,
        transactions at inconsistent merchants, and multiple failed attempts.
        Retrieve at minimum the last 30 days of transaction history.
      tools:
        - name: get_account_transactions
          arg_mappings:
            - param: account_id
              source: account_id
          fixed_args:
            days: 30
          result_key: transaction_data
      on_success: check_device_info
      on_failure: check_device_info

    - id: check_device_info
      name: "Check Device Fingerprint"
      action: tool_call
      instruction: >
        Retrieve device fingerprint data and login/session patterns associated with the
        account to assess whether the activity is consistent with the legitimate account holder.
        Look for new or unrecognized devices, unexpected IP locations, impossible travel,
        inconsistent login patterns, and failed login attempts.
      tools:
        - name: check_device_fingerprint
          arg_mappings:
            - param: account_id
              source: account_id
          result_key: device_data
      on_success: assess_risk
      on_failure: assess_risk

    - id: assess_risk
      name: "Assess Risk Determination"
      action: evaluate
      instruction: >
        Consolidate all evidence gathered — alert details, transaction history, and device/
        session information — to make a comprehensive risk determination. Evaluate the
        cumulative weight of evidence and classify the alert outcome as one of:
        1. fraud_confirmed: Multiple high-confidence indicators are present (e.g., new device
           + unusual geography + large transaction + velocity spike). Action: flag the account.
        2. fraud_suspected: Some indicators are present but evidence is not conclusive.
           Action: flag the account for monitoring and escalate to senior analyst.
        3. false_positive: Evidence does not support fraud. Action: clear the alert.
        Make the determination based on the totality of evidence, not any single signal.
      conditions:
        - condition_description: "Multiple high-confidence fraud indicators present — fraud confirmed"
          next_step: take_action_flag
        - condition_description: "Some indicators present but not conclusive — fraud suspected"
          next_step: escalate_senior
        - condition_description: "Evidence does not support fraud — false positive"
          next_step: take_action_clear
      classify_categories:
        - take_action_flag
        - escalate_senior
        - take_action_clear
      classify_result_key: assess_risk_result

    - id: take_action_flag
      name: "Flag Account for Fraud"
      action: tool_call
      instruction: >
        The evidence supports a fraud determination. Flag the account to restrict further
        transactions and protect the customer. Document the specific fraud indicators that
        led to this decision with precise detail.
      tools:
        - name: flag_account
          arg_mappings:
            - param: account_id
              source: account_id
          fixed_args:
            reason: "Fraud confirmed"
            action: "freeze"
          result_key: flag_result
      on_success: document_findings
      on_failure: document_findings

    - id: take_action_clear
      name: "Clear Alert — False Positive"
      action: tool_call
      instruction: >
        The evidence does not support a fraud determination. Clear the alert as a false positive.
        Provide a clear and specific rationale explaining why the activity was determined
        to be legitimate.
      tools:
        - name: close_alert
          arg_mappings:
            - param: alert_id
              source: alert_id
          fixed_args:
            resolution: "false_positive"
          result_key: close_result
      on_success: document_findings
      on_failure: document_findings

    - id: escalate_senior
      name: "Escalate to Senior Analyst"
      action: tool_call
      instruction: >
        The case presents ambiguous or conflicting evidence that warrants senior analyst review.
        Prepare a comprehensive escalation brief and escalate the case. Inform the initiating
        analyst that the case has been escalated and provide an expected response timeline.
      tools:
        - name: escalate_to_supervisor
          arg_mappings:
            - param: case_id
              source: case_id
          fixed_args:
            reason: "Fraud investigation escalation — ambiguous evidence"
            priority: "high"
          result_key: escalation_result
      on_success: document_findings
      on_failure: document_findings

    - id: document_findings
      name: "Document Findings"
      action: tool_call
      instruction: >
        Create a thorough case note documenting all findings, evidence reviewed, and actions
        taken during this triage session. Include: alert summary, evidence reviewed, risk
        determination with reasoning, actions taken, and analyst notes.
      tools:
        - name: add_case_note
          arg_mappings:
            - param: case_id
              source: case_id
          fixed_args:
            note: "Fraud triage findings documented"
          result_key: case_note_result
      on_success: close_or_resolve
      on_failure: close_or_resolve

    - id: alert_not_found
      name: "Alert Not Found"
      action: inform
      instruction: >
        The alert ID provided could not be located in the fraud monitoring system. Inform the
        analyst that the alert was not found and ask them to verify the alert ID for accuracy.
        Suggest possible reasons: the ID may have been entered incorrectly, the alert may have
        already been closed or merged with another case, or there may be a system sync delay.
      options:
        - label: "Try again"
          description: "Analyst wants to provide a corrected alert ID"
          next_step: receive_alert
          detection_keywords:
            - try
            - again
            - check
            - different
            - correct
        - label: "Escalate"
          description: "Analyst wants help from a supervisor"
          next_step: escalate_senior
          detection_keywords:
            - help
            - supervisor
            - escalat

    - id: close_or_resolve
      name: "Close Alert"
      action: tool_call
      instruction: >
        Close the alert with the appropriate resolution status based on the actions taken.
        Update the alert record with the final resolution and timestamp. Confirm with the
        initiating analyst that the triage is complete and summarize the outcome.
      tools:
        - name: close_alert
          arg_mappings:
            - param: alert_id
              source: alert_id
          fixed_args:
            resolution: "resolved"
          result_key: final_close_result
      on_success: end
      on_failure: end
      next_step: end
